<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.t('not_found') }} - {{ t.t('app_name') }}</title>
    <link rel="icon" href="/static/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <nav class="bg-blue-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-4">
            <a href="/" class="text-xl font-bold">🍳 {{ t.t('app_name') }}</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-16 text-center">
        <h1 class="text-4xl font-bold mb-4">Oops!</h1>
        <p class="text-gray-600 text-lg mb-8">{{ message }}</p>
        <a href="/" class="inline-block bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700 transition">
            {{ t.t('back_home') }}
        </a>
    </main>

    <footer class="bg-gray-800 text-white py-6 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p>{{ t.t('footer_text') }}</p>
        </div>
    </footer>
</body>
</html>
