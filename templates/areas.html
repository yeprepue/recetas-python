<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.t('areas') }} - {{ t.t('app_name') }}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <nav class="bg-blue-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <a href="/" class="text-xl font-bold">🍳 {{ t.t('app_name') }}</a>
            <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
                <form action="/search" method="get" class="flex gap-2">
                    <input type="text" name="q" placeholder="{{ t.t('search_placeholder') }}" 
                        class="px-4 py-2 rounded text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-300 w-full md:w-64">
                    <button type="submit" class="bg-blue-500 hover:bg-blue-700 px-4 py-2 rounded transition">
                        {{ t.t('search_button') }}
                    </button>
                </form>
                <select onchange="window.location.href='/set-language/' + this.value" class="px-3 py-2 rounded text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-300">
                    {% for code, name in t.get_available_languages().items() %}
                    <option value="{{ code }}" {% if t.language == code %}selected{% endif %}>{{ name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </nav>

    <div class="bg-blue-700 text-white">
        <div class="container mx-auto px-4">
            <ul class="flex flex-wrap gap-4 py-2">
                <li><a href="/" class="hover:underline">{{ t.t('home') }}</a></li>
                <li><a href="/categories" class="hover:underline">{{ t.t('categories') }}</a></li>
                <li><a href="/areas" class="hover:underline">{{ t.t('areas') }}</a></li>
                <li><a href="/ingredients" class="hover:underline">{{ t.t('ingredients') }}</a></li>
            </ul>
        </div>
    </div>

    <main class="container mx-auto px-4 py-8">
        <h1 class="text-2xl md:text-3xl font-bold mb-6">{{ t.t('areas') }}</h1>
        
        {% if areas %}
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            {% for area in areas %}
            <a href="/area/{{ area.name }}" class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition text-center">
                <h3 class="font-bold text-lg">{{ area.name }}</h3>
            </a>
            {% endfor %}
        </div>
        {% else %}
        <p class="text-gray-500">{{ t.t('no_results') }}</p>
        {% endif %}
    </main>

    <footer class="bg-gray-800 text-white py-6 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p>{{ t.t('footer_text') }}</p>
        </div>
    </footer>
</body>
</html>
