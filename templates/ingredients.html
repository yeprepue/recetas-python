<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <nav class="bg-blue-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <a href="/" class="text-xl font-bold">🍳 Recetario</a>
            <form action="/search" method="get" class="flex gap-2 w-full md:w-auto">
                <input type="text" name="q" placeholder="Buscar comida..." 
                    class="px-4 py-2 rounded text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-300 w-full md:w-64">
                <button type="submit" class="bg-blue-500 hover:bg-blue-700 px-4 py-2 rounded transition">
                    Buscar
                </button>
            </form>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <h1 class="text-2xl md:text-3xl font-bold mb-6">Ingredientes</h1>
        
        {% if ingredients %}
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
            {% for ing in ingredients %}
            <a href="/ingredient/{{ ing.name }}" class="bg-white p-4 rounded-lg shadow hover:shadow-lg transition text-center">
                <img src="https://www.themealdb.com/images/ingredients/{{ ing.name }}-small.png" 
                     alt="{{ ing.name }}" class="w-16 h-16 mx-auto mb-2">
                <h3 class="font-bold text-sm truncate">{{ ing.name }}</h3>
            </a>
            {% endfor %}
        </div>
        {% else %}
        <p class="text-gray-500">No hay ingredientes disponibles.</p>
        {% endif %}
    </main>

    <footer class="bg-gray-800 text-white py-6 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p>Recetario Python © 2026</p>
        </div>
    </footer>
</body>
</html>
