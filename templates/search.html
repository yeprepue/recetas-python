<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados de búsqueda</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <nav class="bg-blue-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <a href="/" class="text-xl font-bold">🍳 Recetario</a>
            <form action="/search" method="get" class="flex gap-2 w-full md:w-auto">
                <input type="text" name="q" value="{{ query }}" placeholder="Buscar comida..." 
                    class="px-4 py-2 rounded text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-300 w-full md:w-64">
                <button type="submit" class="bg-blue-500 hover:bg-blue-700 px-4 py-2 rounded transition">
                    Buscar
                </button>
            </form>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <h1 class="text-2xl md:text-3xl font-bold mb-6">
            {{ query if query else 'Resultados' }}
        </h1>
        
        {% if meals %}
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            {% for meal in meals %}
            <a href="/meal/{{ meal.id }}" class="bg-white rounded-lg shadow hover:shadow-lg transition overflow-hidden">
                <img src="{{ meal.image_url }}" alt="{{ meal.name }}" 
                     class="w-full h-48 object-cover">
                <div class="p-4">
                    <h3 class="font-bold text-lg truncate">{{ meal.name }}</h3>
                    {% if meal.category %}
                    <p class="text-sm text-gray-500">{{ meal.category }}</p>
                    {% endif %}
                </div>
            </a>
            {% endfor %}
        </div>
        {% else %}
        <div class="text-center py-12">
            <p class="text-gray-500 text-lg">No se encontraron resultados</p>
            <a href="/" class="text-blue-600 hover:underline mt-4 inline-block">Volver al inicio</a>
        </div>
        {% endif %}
    </main>

    <footer class="bg-gray-800 text-white py-6 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p>Recetario Python © 2026</p>
        </div>
    </footer>
</body>
</html>
